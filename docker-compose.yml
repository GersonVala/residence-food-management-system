version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: fundacion_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fundacion}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fundacion_pass}
      POSTGRES_DB: ${POSTGRES_DB:-fundacion_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fundacion} -d ${POSTGRES_DB:-fundacion_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fundacion_migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-fundacion}:${POSTGRES_PASSWORD:-fundacion_pass}@postgres:5432/${POSTGRES_DB:-fundacion_db}
    command: npx prisma migrate deploy
    restart: "no"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fundacion_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-fundacion}:${POSTGRES_PASSWORD:-fundacion_pass}@postgres:5432/${POSTGRES_DB:-fundacion_db}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-prod}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      PORT: 3001
      NODE_ENV: ${NODE_ENV:-development}
      FRONTEND_URL: http://localhost:3000
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fundacion_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NODE_ENV: ${NODE_ENV:-development}
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

  mailhog:
    image: mailhog/mailhog:latest
    container_name: fundacion_mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres_data:
